
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>One Man Operator</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1 id="courtTitle">Operator</h1>
  <hr>

<h3>Match Setup</h3>

<div>
    Home Team:
    <input id="homeNameInput" type="text">
</div>

<br>

<div>
    Away Team:
    <input id="awayNameInput" type="text">
</div>

<br>

<button id="saveTeamNames">
    Save Team Names
</button>

<hr>
<div>Home: <span id="homeScore">0</span></div>
<div>Away: <span id="awayScore">0</span></div>
<br>
<button onclick="changeScore('home',1)">Home +1</button>
<button onclick="changeScore('away',1)">Away +1</button>
<script type="module" src="js/operator.js"></script>
</body>
</html>
