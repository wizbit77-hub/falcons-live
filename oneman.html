<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
 name="viewport"
 content="width=device-width, initial-scale=1.0">

<title>Falcons Live - One Operator</title>

<link
    rel="stylesheet"
    href="css/style.css">

</head>

<body>

<div class="page">

<h1 id="courtTitle">
    ONE OPERATOR
</h1>

<div class="mainLayout">

<div class="column">

<div class="section">

    <div class="teamSide">
        HOME
    </div>

    <h2 id="homeTeamTitle">
        HOME TEAM
    </h2>

<input
    id="homeNameInput"
    placeholder="Home Team Name">

    <button
    id="saveTeams">
    Save
</button>

    <div
        id="homeScore"
        class="score">
        0
    </div>

    <div class="buttonGrid">

        <button id="homePlus3">+3</button>

        <button id="homePlus2">+2</button>

        <button id="homePlus1">+1</button>

        <button id="homeMinus1">-1</button>

    </div>

    <hr>

    <div>

        Fouls:
        <span id="homeFouls">
            0
        </span>

        <button id="homeFoulPlus">
            +
        </button>

        <button id="homeFoulMinus">
            -
        </button>

    </div>

    <br>

    <div>

        Timeouts:
        <span id="homeTimeouts">
            0
        </span>

        <button id="homeTimeoutPlus">
            +
        </button>

        <button id="homeTimeoutMinus">
            -
        </button>

    </div>

</div>

</div>

<!-- CLOCK COLUMN -->

<div class="column">

<div class="section">

    <h2>
        GAME CLOCK
    </h2>

    <div>

        <button id="periodDown">
            ◄
        </button>

        <span id="periodDisplay">
            PERIOD 1
        </span>

        <button id="periodUp">
            ►
        </button>

    </div>

    <div
        id="gameClock"
        class="score">

        10:00

    </div>

    <button
        id="clockToggle">

        START

    </button>

    <br><br>

    <button
        id="clockMinusMinute">

        -1 MIN

    </button>

    <button
        id="clockPlusMinute">

        +1 MIN

    </button>

    <hr>

    <button
        id="togglePossession"
        class="possessionButton">

        ◄

    </button>

</div>

</div>

<!-- AWAY COLUMN -->

<div class="column">

<div class="section">

    <div class="teamSide">
        AWAY
    </div>

    <h2 id="awayTeamTitle">
        AWAY TEAM
    </h2>

<input
    id="awayNameInput"
    placeholder="Away Team Name">

    <button
    id="saveTeams">
    Save
</button>

    <div
        id="awayScore"
        class="score">
        0
    </div>

    <div class="buttonGrid">

        <button id="awayPlus3">+3</button>

        <button id="awayPlus2">+2</button>

        <button id="awayPlus1">+1</button>

        <button id="awayMinus1">-1</button>

    </div>

    <hr>

    <div>

        Fouls:
        <span id="awayFouls">
            0
        </span>

        <button id="awayFoulPlus">
            +
        </button>

        <button id="awayFoulMinus">
            -
        </button>

    </div>

    <br>

    <div>

        Timeouts:
        <span id="awayTimeouts">
            0
        </span>

        <button id="awayTimeoutPlus">
            +
        </button>

        <button id="awayTimeoutMinus">
            -
        </button>

    </div>

</div>

</div>

</div>
</div>

<script
    type="module"
    src="js/oneman.js">
</script>

</body>

</html>
