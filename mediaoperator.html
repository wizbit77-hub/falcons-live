<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Falcons Live - Media Operator</title>

<link
    rel="stylesheet"
    href="css/style.css">

</head>

<body>

<h1>Media Operator</h1>

<div class="mainLayout">

    <div class="column">

        <div class="section">

            <h2>Live Display</h2>

<div id="previewWindow">

    <iframe
        id="displayMonitor"
        src="display.html"
        title="Live Display"
        frameborder="0">
    </iframe>

</div>

        </div>

        <div class="section">

            <h2>Current Output</h2>

            <div id="currentOutput">

                🟢 Scoreboard

            </div>

            <br>

            <strong>Automatic Mode</strong>

            <div>

                Enabled

            </div>

        </div>

    </div>

    <div class="column">

        <div class="section">

            <h2>Available Media</h2>

<div id="mediaSlots"></div>

            

    </div>

    <div class="column">

        <div class="section">

            <h2>Template Settings</h2>

            <p>

                Select a template to edit.

            </p>

        </div>

    </div>

</div>
<script
    type="module"
    src="js/mediaoperator.js">
</script>
</body>

</html>
