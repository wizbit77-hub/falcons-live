<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Falcons Live - Media Operator</title>

<link
    rel="stylesheet"
    href="css/style.css">

</head>

<body>

<h1>Media Operator</h1>

<div class="mainLayout">

    <div class="column">

        <div class="section">

            <h2>Live Output Preview</h2>

            <div id="previewWindow">

                Preview Coming Soon

            </div>

        </div>

        <div class="section">

            <h2>Current Output</h2>

            <div id="currentOutput">

                🟢 Scoreboard

            </div>

            <br>

            <strong>Automatic Mode</strong>

            <div>

                Enabled

            </div>

        </div>

    </div>

    <div class="column">

        <div class="section">

            <h2>Output Templates</h2>

            <button class="templateButton">

                Scoreboard

            </button>

            <button class="templateButton">

                Break

            </button>

            <button class="templateButton">

                Halftime

            </button>

            <button class="templateButton">

                Camera

            </button>

            <button class="templateButton">

                Sponsors

            </button>

            <button class="templateButton">

                Summary

            </button>

        </div>

    </div>

    <div class="column">

        <div class="section">

            <h2>Template Settings</h2>

            <p>

                Select a template to edit.

            </p>

        </div>

    </div>

</div>
</body>

</html>
